# Gradle performance
org.gradle.jvmargs=-Xmx2G -Xms512m
org.gradle.parallel=true
org.gradle.caching=true

# Fabric toolchain — all versions verified from official 1.21.11 example mod
minecraft_version=1.21.11
loader_version=0.19.2

# Loom — 1.16-SNAPSHOT is required for 1.21.11 (confirmed from official example mod)
# Plugin ID: net.fabricmc.fabric-loom-remap
loom_version=1.16-SNAPSHOT

# Fabric API — verified: Modrinth + CurseForge, Feb 3 2026
fabric_version=0.141.3+1.21.11

# Kotlin — via fabric-language-kotlin (bundles coroutines + serialization)
# DO NOT add kotlinx-coroutines or kotlinx-serialization separately
kotlin_version=2.3.0
fabric_language_kotlin_version=1.13.8+kotlin.2.3.0

# Ktor Client — verified: latest stable 3.4.3, released April 22 2026
# Source: https://github.com/ktorio/ktor/releases
ktor_version=3.4.3

# Mod metadata
mod_version=0.1.0
maven_group=com.muhofy
archives_base_name=structra